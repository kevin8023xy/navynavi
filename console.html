<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NavyNavi — Console</title>
  <meta name="description" content="NavyNavi 0.2.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chango&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['Chango', 'cursive'],
          },
        },
      },
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; overflow: hidden; }
    #map { width: 100%; height: 100vh; }
    .menubar-trigger {
      font-family: 'Chango', cursive;
    }
  </style>
</head>
<body class="antialiased">
  <div class="relative w-full h-screen">
    <div id="map" class="absolute inset-0"></div>
    <div class="absolute inset-x-0 top-0 z-10">
      <div role="menubar" class="flex h-9 items-center space-x-1 border border-b border-none px-[9px] bg-white/50 backdrop-blur-sm shadow-sm rounded-none">
        <button class="menubar-trigger flex cursor-default select-none items-center rounded-sm px-3 py-1 text-sm font-medium outline-none focus:bg-gray-200/60 data-[state=open]:bg-gray-200/60 mb-[1px]">
          NavyNavi
        </button>
        <button class="flex cursor-default select-none items-center rounded-sm px-3 py-1 text-sm font-medium outline-none focus:bg-gray-200/60 data-[state=open]:bg-gray-200/60">
          Tools
        </button>
        <button class="hidden md:flex cursor-default select-none items-center rounded-sm px-3 py-1 text-sm font-medium outline-none focus:bg-gray-200/60 data-[state=open]:bg-gray-200/60">
          File
        </button>
        <button class="hidden md:flex cursor-default select-none items-center rounded-sm px-3 py-1 text-sm font-medium outline-none focus:bg-gray-200/60 data-[state=open]:bg-gray-200/60">
          Edit
        </button>
        <button class="hidden md:flex cursor-default select-none items-center rounded-sm px-3 py-1 text-sm font-medium outline-none focus:bg-gray-200/60 data-[state=open]:bg-gray-200/60">
          View
        </button>
        <button class="hidden md:flex cursor-default select-none items-center rounded-sm px-3 py-1 text-sm font-medium outline-none focus:bg-gray-200/60 data-[state=open]:bg-gray-200/60">
          Account
        </button>
      </div>
    </div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map', {
      center: [25.0, 121.5],
      zoom: 6,
      zoomControl: true,
      attributionControl: true,
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 19,
    }).addTo(map);
  </script>
</body>
</html>
