<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NavyNavi</title>
  <meta name="description" content="NavyNavi 0.2.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chango&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['Chango', 'cursive'],
            body: ['Inter', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .bg-grid {
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }
  </style>
</head>
<body class="antialiased">
  <main class="min-h-screen bg-gradient-to-br from-blue-900 via-blue-700 to-blue-500 flex items-center justify-center p-4 relative">
    <div class="absolute inset-0 bg-grid opacity-40"></div>
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,rgba(255,255,255,0.08)_0%,transparent_70%)]"></div>
    <div class="relative z-10 w-full max-w-6xl mx-auto text-white">
      <header class="flex flex-col items-center text-center my-8 md:my-32">
        <svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" class="mb-8">
          <circle cx="64" cy="64" r="60" stroke="rgba(255,255,255,0.3)" stroke-width="2" fill="none" />
          <circle cx="64" cy="64" r="48" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none" stroke-dasharray="4 4" />
          <path d="M64 28 L72 52 L64 48 L56 52 L64 28Z" fill="#93C5FD" opacity="0.9" />
          <path d="M64 48 L64 80" stroke="#93C5FD" stroke-width="2" stroke-linecap="round" />
          <path d="M48 60 L64 56 L80 60" stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round" opacity="0.6" />
          <path d="M36 86 Q50 72 64 80 Q78 72 92 86" stroke="#93C5FD" stroke-width="2" stroke-linecap="round" fill="none" />
          <path d="M40 90 Q52 78 64 84 Q76 78 88 90" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round" fill="none" />
          <circle cx="64" cy="36" r="3" fill="#60A5FA" />
          <circle cx="64" cy="36" r="6" stroke="#60A5FA" stroke-width="1" fill="none" opacity="0.5" />
        </svg>
        <h1 class="font-heading text-3xl md:text-5xl font-bold mb-4 tracking-wide">NavyNavi</h1>
        <p class="text-base text-blue-200">Version 0.6.2</p>
      </header>
      <div class="grid md:grid-cols-2 gap-8 mx-6">
        <a class="group block p-8 rounded-2xl bg-white bg-opacity-10 backdrop-blur-lg border border-white border-opacity-20 transition-all duration-300 hover:bg-opacity-20 hover:scale-105" href="#">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-16 h-16 mb-4 text-blue-300 group-hover:text-blue-200">
            <path d="M12 10.189V14" />
            <path d="M12 2v3" />
            <path d="M19 13V7a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v6" />
            <path d="M19.38 20A11.6 11.6 0 0 0 21 14l-8.188-3.639a2 2 0 0 0-1.624 0L3 14a11.6 11.6 0 0 0 2.81 7.76" />
            <path d="M2 21c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1s1.2 1 2.5 1c2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1" />
          </svg>
          <h2 class="text-2xl font-semibold mb-2">Client Portal</h2>
          <p class="text-blue-200">Access vessel tracking and maritime information</p>
        </a>
        <a class="group block p-8 rounded-2xl bg-white bg-opacity-10 backdrop-blur-lg border border-white border-opacity-20 transition-all duration-300 hover:bg-opacity-20 hover:scale-105" href="#">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-16 h-16 mb-4 text-blue-300 group-hover:text-blue-200">
            <path d="M12 22V8" />
            <path d="M5 12H2a10 10 0 0 0 20 0h-3" />
            <circle cx="12" cy="5" r="3" />
          </svg>
          <h2 class="text-2xl font-semibold mb-2">Console</h2>
          <p class="text-blue-200">Manage and monitor VTS operations</p>
        </a>
      </div>
      <footer class="mt-8 md:mt-24 text-center text-sm text-blue-200">
        <p>Copyright &copy; 2024-2025 NavyNavi Team. All rights reserved.</p>
      </footer>
    </div>
  </main>
</body>
</html>
